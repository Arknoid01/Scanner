<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Scanner Boucherie</title>

<!-- ZXing pour le scan -->
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --accent: #e63946;
    --accent2: #ff6b6b;
    --text: #f0ece4;
    --text-dim: #9090a8;
    --green: #2dc653;
    --border: #2e2e4a;
    --radius: 12px;
    --font-mono: 'Courier New', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--accent); }

  #btn-auth {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  #btn-auth:hover { opacity: .85; }
  #btn-auth.connected {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--green);
  }

  /* ─── TABS ─── */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 12px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all .2s;
    user-select: none;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* ─── PAGES ─── */
  .page { display: none; flex: 1; flex-direction: column; padding: 20px; gap: 16px; }
  .page.active { display: flex; }

  /* ─── SCANNER ─── */
  #reader {
    width: 100%;
    border-radius: var(--radius);
    overflow: hidden;
    background: #000;
  }
  #reader video { width: 100% !important; border-radius: var(--radius); }
  #reader img { display: none !important; }
  /* Cacher les boutons par défaut de html5-qrcode */
  #reader__dashboard { display: none !important; }
  #reader__scan_region { border: none !important; }
  #reader__scan_region > img { display: none !important; }

  #btn-scan {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
    letter-spacing: .3px;
  }
  #btn-scan:hover { opacity: .88; }
  #btn-scan:disabled { opacity: .4; cursor: not-allowed; }

  /* ─── RÉSULTAT SCAN ─── */
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .result-card.visible { display: flex; }
  .result-card.unknown { border-color: var(--accent); }
  .result-card.known { border-color: var(--green); }

  .result-code {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .result-name {
    font-size: 20px;
    font-weight: 700;
  }
  .result-name.unknown-label { color: var(--accent); font-size: 14px; font-weight: 500; }

  .name-input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    width: 100%;
    outline: none;
  }
  .name-input:focus { border-color: var(--accent); }
  .name-input::placeholder { color: var(--text-dim); }

  .btn-save {
    padding: 12px;
    background: var(--green);
    color: #0f1a12;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s;
  }
  .btn-save:hover { opacity: .85; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 20px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 500;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent); color: var(--accent); }

  /* ─── HISTORIQUE ─── */
  .search-bar {
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px 12px 40px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
    pointer-events: none;
  }

  .days-list, .entries-list { display: flex; flex-direction: column; gap: 8px; }

  .day-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color .2s;
  }
  .day-card:hover { border-color: var(--accent); }

  .day-date { font-weight: 600; font-size: 15px; }
  .day-count {
    background: var(--surface2);
    border-radius: 100px;
    padding: 4px 10px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 0;
    background: none;
    border: none;
  }
  .back-btn:hover { color: var(--text); }

  .day-title {
    font-size: 18px;
    font-weight: 700;
  }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
  }
  .entry-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .entry-name { font-weight: 600; font-size: 15px; }
  .entry-time { font-size: 12px; color: var(--text-dim); white-space: nowrap; margin-top: 2px; }
  .entry-code { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 4px; }

  .search-results-title {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  .loading {
    text-align: center;
    padding: 30px;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* Spinner */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ─── CONGÉLATEUR ─── */
  #btn-freezer-scan {
    width: 100%;
    padding: 12px;
    background: #1a3a5c;
    color: #7ec8e3;
    border: 1px solid #2a5a8c;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
  }
  #btn-freezer-scan:hover { opacity: .85; }
  #freezer-reader { width: 100%; border-radius: var(--radius); overflow: hidden; }
  #freezer-reader video { width: 100% !important; border-radius: var(--radius); }
  #freezer-reader__dashboard { display: none !important; }

  .freezer-list { display: flex; flex-direction: column; gap: 8px; }

  .freezer-card {
    background: var(--surface);
    border: 1px solid #1a3a5c;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .freezer-card-info { flex: 1; }
  .freezer-card-name { font-weight: 600; font-size: 15px; }
  .freezer-card-date { font-size: 12px; color: #7ec8e3; margin-top: 3px; }
  .freezer-card-age { font-size: 12px; color: var(--text-dim); }

  .btn-remove {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-dim);
    padding: 8px 10px;
    font-size: 16px;
    cursor: pointer;
    transition: all .2s;
    flex-shrink: 0;
  }
  .btn-remove:hover { border-color: var(--accent); color: var(--accent); }

  .freezer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .freezer-count {
    font-size: 13px;
    color: #7ec8e3;
    font-weight: 500;
  }

  /* ─── ÉTIQUETTES ─── */
  .label-create-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .label-create-box h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }
  .input-row {
    display: flex;
    gap: 8px;
  }
  .input-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }
  .input-row input:focus { border-color: var(--accent); }
  .input-row input::placeholder { color: var(--text-dim); }
  .btn-create {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 11px 16px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }

  .barcode-preview {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .barcode-preview.visible { display: flex; }
  .barcode-preview svg { max-width: 100%; }
  .barcode-nom {
    font-size: 16px;
    font-weight: 700;
    color: #111;
    text-align: center;
  }
  .btn-print {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }

  .labels-list { display: flex; flex-direction: column; gap: 8px; }
  .label-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .label-card-name { font-weight: 600; font-size: 15px; }
  .label-card-code { font-family: var(--font-mono); font-size: 11px; color: var(--text-dim); margin-top: 2px; }
  .label-card-last { font-size: 12px; color: var(--text-dim); white-space: nowrap; }
  .btn-show-barcode {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-show-barcode:hover { border-color: var(--accent); color: var(--accent); }

  /* Checkboxes étiquettes */
  .label-select-bar {
    display: none;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
  }
  .label-select-bar.visible { display: flex; }
  .btn-print-selected {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .btn-cancel-select {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 13px;
    cursor: pointer;
    padding: 4px 8px;
  }
  .label-card {
    cursor: pointer;
    transition: border-color .2s;
  }
  .label-card.selected { border-color: var(--accent) !important; background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
  .label-checkbox {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    transition: all .15s;
  }
  .label-card.selected .label-checkbox { background: var(--accent); border-color: var(--accent); }

  @media print {
    body > *:not(#print-area) { display: none !important; }
    #print-area { display: block !important; padding: 20px; }
  }
  #print-area { display: none; }

  /* ─── EDIT NOM ─── */
  .btn-edit {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  .btn-edit:hover { border-color: var(--accent); color: var(--accent); }

  .edit-inline {
    display: flex;
    gap: 8px;
    margin-top: 8px;
  }
  .edit-inline input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 10px;
    color: var(--text);
    font-size: 14px;
    outline: none;
  }
  .btn-confirm {
    background: var(--green);
    color: #0f1a12;
    border: none;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Boucher<span>ie</span> Scanner</div>
  <button id="btn-auth" onclick="handleAuth()">Se connecter</button>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('scan')">📷 Scanner</div>
  <div class="tab" onclick="switchTab('history')">📅 Historique</div>
  <div class="tab" onclick="switchTab('labels')">🏷️ Étiquettes</div>
  <div class="tab" onclick="switchTab('freezer')">🧊 Congélateur</div>
</div>

<!-- ═══ PAGE SCAN ═══ -->
<div class="page active" id="page-scan">
  <div id="reader"></div>

  <button id="btn-scan" onclick="startScan()">📷 Démarrer le scanner</button>

  <div class="result-card" id="result-card">
    <div class="result-code" id="result-code"></div>
    <div id="result-known-area"></div>
    <button class="btn-save" id="btn-upload" onclick="uploadEntry()">
      ✓ Enregistrer sur Drive
    </button>
  </div>
</div>

<!-- ═══ PAGE ÉTIQUETTES ═══ -->
<div class="page" id="page-labels">
  <div class="label-create-box">
    <h3>Créer une étiquette</h3>
    <div class="input-row">
      <input type="text" id="label-name-input" placeholder="Ex : Filet de poulet" onkeydown="if(event.key==='Enter') createLabel()">
      <button class="btn-create" onclick="createLabel()">Créer</button>
    </div>
  </div>

  <div class="barcode-preview" id="barcode-preview">
    <div class="barcode-nom" id="barcode-nom"></div>
    <svg id="barcode-svg"></svg>
    <div style="font-family:monospace;font-size:12px;color:#666;" id="barcode-code-display"></div>
    <button class="btn-print" onclick="printBarcode()">🖨️ Imprimer l'étiquette</button>
  </div>

  <div id="labels-list-content"></div>
</div>

<!-- ═══ PAGE CONGÉLATEUR ═══ -->
<div class="page" id="page-freezer">

  <div class="label-create-box">
    <h3>Scanner un produit</h3>
    <p style="font-size:13px;color:var(--text-dim);">Scanne le code-barres ou entre le nom manuellement.</p>
    <div id="freezer-reader"></div>
    <button id="btn-freezer-scan" onclick="startFreezerScan()">📷 Scanner</button>
    <div style="display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:12px;">
      <div style="flex:1;height:1px;background:var(--border);"></div>ou<div style="flex:1;height:1px;background:var(--border);"></div>
    </div>
    <div class="input-row">
      <input type="text" id="freezer-manual-input" placeholder="Nom du produit…" onkeydown="if(event.key==='Enter') addFreezerManual()">
      <button class="btn-create" onclick="addFreezerManual()">Ajouter</button>
    </div>
  </div>

  <div id="freezer-content"></div>
</div>

<!-- ═══ PAGE HISTORIQUE ═══ -->
<div class="page" id="page-history">
  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Rechercher un produit…" oninput="handleSearch()">
  </div>
  <div id="history-content"></div>
</div>

<div class="toast" id="toast"></div>
<div id="print-area"></div>

<script>
// ═══════════════════════════════════════
// CONFIG — à remplir
// ═══════════════════════════════════════
const CLIENT_ID = '995775640527-b12ev3k67kvi450j97usaqjsirmbj5hg.apps.googleusercontent.com';
const DRIVE_FOLDER_NAME = 'Scanner Boucherie';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let accessToken = null;
let driveFolderId = null;
let produitsDict = {};  // { code: nom }
let currentScan = null; // { code, nom, date, heure }
let tokenClient = null;
let html5QrCode = null;
let scanActive = false;
let currentView = 'days'; // 'days' | 'day' | 'search'
let allEntries = []; // cache pour la recherche
let freezerItems = []; // état actuel du congélateur
let selectedLabels = new Set(); // codes sélectionnés pour impression
let freezerScanActive = false;
let freezerCodeReader = null;

// ── Cache pour accélérer les uploads ──
const cache = {
  dayFolderIds: {},   // { dateStr: folderId }
  dayFileIds: {},     // { dateStr: fileId }
  dayEntries: {},     // { dateStr: [...entries] }
  produitsDirty: false // produits.json a besoin d'être sauvé
};

// ═══════════════════════════════════════
// AUTH GOOGLE
// ═══════════════════════════════════════
function initGoogleAuth() {
  if (typeof google === 'undefined') {
    setTimeout(initGoogleAuth, 500);
    return;
  }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (response) => {
      if (response.error) { showToast('Erreur auth', 'error'); return; }
      accessToken = response.access_token;
      // Stocke le token avec son expiry (1h par défaut Google)
      const expiry = Date.now() + (response.expires_in || 3600) * 1000;
      localStorage.setItem('ga_token', accessToken);
      localStorage.setItem('ga_expiry', expiry);
      setConnectedUI();
      await initDrive();
    }
  });
}

function setConnectedUI() {
  document.getElementById('btn-auth').textContent = '✓ Connecté';
  document.getElementById('btn-auth').classList.add('connected');
}

function handleAuth() {
  if (accessToken) return;
  tokenClient.requestAccessToken();
}

async function initDrive() {
  driveFolderId = await getOrCreateFolder(DRIVE_FOLDER_NAME, null);
  produitsDict = await loadProduitsJson();
  showToast('Drive connecté ✓', 'success');
}

// ═══════════════════════════════════════
// DRIVE HELPERS
// ═══════════════════════════════════════
async function driveGet(url) {
  const r = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  return r.json();
}

async function getOrCreateFolder(name, parentId) {
  let q = `name='${name}' and mimeType='application/vnd.google-apps.folder' and trashed=false`;
  if (parentId) q += ` and '${parentId}' in parents`;
  const data = await driveGet(`https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&fields=files(id,name)`);
  if (data.files && data.files.length > 0) return data.files[0].id;

  const meta = { name, mimeType: 'application/vnd.google-apps.folder' };
  if (parentId) meta.parents = [parentId];
  const r = await fetch('https://www.googleapis.com/drive/v3/files', {
    method: 'POST',
    headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(meta)
  });
  const f = await r.json();
  return f.id;
}

async function loadProduitsJson() {
  const data = await driveGet(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='produits.json' and '${driveFolderId}' in parents and trashed=false`)}&fields=files(id)`
  );
  if (!data.files || data.files.length === 0) return {};
  const fileId = data.files[0].id;
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  return r.json();
}

async function saveProduitsJson() {
  // Cherche le fichier existant
  const data = await driveGet(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='produits.json' and '${driveFolderId}' in parents and trashed=false`)}&fields=files(id)`
  );
  const content = JSON.stringify(produitsDict, null, 2);
  const blob = new Blob([content], { type: 'application/json' });

  if (data.files && data.files.length > 0) {
    // Mise à jour
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${data.files[0].id}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: blob
    });
  } else {
    // Création
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: 'produits.json', parents: [driveFolderId] })], { type: 'application/json' }));
    form.append('file', blob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}` },
      body: form
    });
  }
}

async function getDayFolderId(dateStr) {
  if (cache.dayFolderIds[dateStr]) return cache.dayFolderIds[dateStr];
  const id = await getOrCreateFolder(dateStr, driveFolderId);
  cache.dayFolderIds[dateStr] = id;
  return id;
}

async function uploadDayJson(dateStr, entries) {
  const folderId = await getDayFolderId(dateStr);
  const filename = `${dateStr}.json`;
  const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });

  if (cache.dayFileIds[dateStr]) {
    // On connaît déjà l'ID → PATCH direct, 1 seul appel
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${cache.dayFileIds[dateStr]}?uploadType=media`, {
      method: 'PATCH',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: blob
    });
  } else {
    // Cherche si le fichier existe déjà
    const existing = await driveGet(
      `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${filename}' and '${folderId}' in parents and trashed=false`)}&fields=files(id)`
    );
    if (existing.files && existing.files.length > 0) {
      cache.dayFileIds[dateStr] = existing.files[0].id;
      await fetch(`https://www.googleapis.com/upload/drive/v3/files/${existing.files[0].id}?uploadType=media`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: blob
      });
    } else {
      const form = new FormData();
      form.append('metadata', new Blob([JSON.stringify({ name: filename, parents: [folderId] })], { type: 'application/json' }));
      form.append('file', blob);
      const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
        method: 'POST',
        headers: { Authorization: `Bearer ${accessToken}` },
        body: form
      });
      const created = await r.json();
      if (created.id) cache.dayFileIds[dateStr] = created.id;
    }
  }
  // Met à jour le cache mémoire des entrées
  cache.dayEntries[dateStr] = entries;
}

async function loadDayEntries(dateStr) {
  if (cache.dayEntries[dateStr]) return [...cache.dayEntries[dateStr]];
  const folderId = await getDayFolderId(dateStr);
  const filename = `${dateStr}.json`;
  const data = await driveGet(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`name='${filename}' and '${folderId}' in parents and trashed=false`)}&fields=files(id)`
  );
  if (!data.files || data.files.length === 0) return [];
  cache.dayFileIds[dateStr] = data.files[0].id;
  const r = await fetch(`https://www.googleapis.com/drive/v3/files/${data.files[0].id}?alt=media`, {
    headers: { Authorization: `Bearer ${accessToken}` }
  });
  const entries = await r.json();
  cache.dayEntries[dateStr] = entries;
  return [...entries];
}

async function listDayFolders() {
  const data = await driveGet(
    `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(`'${driveFolderId}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`)}&orderBy=name desc&fields=files(id,name)&pageSize=100`
  );
  return data.files || [];
}

// Nettoyage auto > 2 mois
async function cleanOldFolders() {
  if (!driveFolderId) return;
  const cutoff = new Date();
  cutoff.setMonth(cutoff.getMonth() - 2);
  const folders = await listDayFolders();
  for (const folder of folders) {
    const d = new Date(folder.name);
    if (!isNaN(d) && d < cutoff) {
      await fetch(`https://www.googleapis.com/drive/v3/files/${folder.id}`, {
        method: 'DELETE',
        headers: { Authorization: `Bearer ${accessToken}` }
      });
    }
  }
}

async function startScan() {
  if (scanActive) { stopScan(); return; }

  try {
    scanActive = true;
    document.getElementById('btn-scan').textContent = '⏹ Arrêter';

    html5QrCode = new Html5Qrcode('reader');
    await html5QrCode.start(
      { facingMode: 'environment' },
      {
        fps: 15,
        qrbox: { width: 280, height: 140 },
        aspectRatio: 1.5,
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.QR_CODE,
          Html5QrcodeSupportedFormats.DATA_MATRIX,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
        ]
      },
      (decodedText) => {
        if (scanActive) onCodeDetected(decodedText);
      },
      () => {} // ignore erreurs de lecture frame par frame
    );
  } catch (e) {
    scanActive = false;
    document.getElementById('btn-scan').textContent = '📷 Démarrer le scanner';
    showToast('Caméra inaccessible', 'error');
    console.error(e);
  }
}

async function stopScan() {
  scanActive = false;
  if (html5QrCode) {
    try { await html5QrCode.stop(); } catch(e) {}
    html5QrCode = null;
  }
  document.getElementById('btn-scan').textContent = '📷 Démarrer le scanner';
}

function onCodeDetected(code) {
  stopScan();
  const now = new Date();
  const dateStr = now.toISOString().slice(0, 10);
  const heureStr = now.toTimeString().slice(0, 5);
  const nom = produitsDict[code] || null;

  currentScan = { code, nom, date: dateStr, heure: heureStr };

  const card = document.getElementById('result-card');
  document.getElementById('result-code').textContent = code;

  const area = document.getElementById('result-known-area');

  if (nom) {
    card.className = 'result-card visible known';
    area.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div class="result-name" id="scan-result-name">${nom}</div>
        <button class="btn-edit" onclick="editScanName()">✏️ Modifier</button>
      </div>
      <div id="scan-edit-area"></div>
    `;
  } else {
    card.className = 'result-card visible unknown';
    area.innerHTML = `
      <div class="result-name unknown-label">Produit inconnu — donne-lui un nom :</div>
      <input class="name-input" id="name-input" type="text" placeholder="Ex : Gratin Dauphinois" oninput="updateScanName(this.value)">
    `;
    setTimeout(() => document.getElementById('name-input')?.focus(), 100);
  }

  // Vibration courte
  if (navigator.vibrate) navigator.vibrate(80);
}

function updateScanName(val) {
  if (currentScan) currentScan.nom = val.trim();
}

function editScanName() {
  const area = document.getElementById('scan-edit-area');
  const current = currentScan?.nom || '';
  area.innerHTML = `
    <div class="edit-inline">
      <input type="text" id="scan-rename-input" value="${current}" placeholder="Nouveau nom…">
      <button class="btn-confirm" onclick="confirmScanRename()">✓</button>
    </div>
  `;
  setTimeout(() => document.getElementById('scan-rename-input')?.focus(), 100);
}

async function confirmScanRename() {
  const val = document.getElementById('scan-rename-input')?.value.trim();
  if (!val || !currentScan) return;
  currentScan.nom = val;
  produitsDict[currentScan.code] = val;
  if (accessToken) await saveProduitsJson();
  // Rafraîchir l'affichage
  document.getElementById('scan-result-name').textContent = val;
  document.getElementById('scan-edit-area').innerHTML = '';
  showToast('Nom mis à jour ✓', 'success');
}

async function renameProduct(code, currentNom) {
  const newNom = prompt(`Renommer "${currentNom}" :`, currentNom);
  if (!newNom || newNom.trim() === currentNom) return;
  const trimmed = newNom.trim();
  produitsDict[code] = trimmed;

  // Met à jour le nom dans tous les JSON du jour en cache
  for (const dateStr of Object.keys(cache.dayEntries)) {
    let changed = false;
    cache.dayEntries[dateStr] = cache.dayEntries[dateStr].map(e => {
      if (e.code === code) { changed = true; return { ...e, nom: trimmed }; }
      return e;
    });
    if (changed) await uploadDayJson(dateStr, cache.dayEntries[dateStr]);
  }

  // Met à jour allEntries pour la recherche
  allEntries = allEntries.map(e => e.code === code ? { ...e, nom: trimmed } : e);

  await saveProduitsJson();
  showToast(`Renommé en "${trimmed}" ✓`, 'success');
  loadHistory();
}

async function uploadEntry() {
  if (!accessToken) { showToast('Connecte-toi d\'abord à Drive', 'error'); return; }
  if (!currentScan) return;
  if (!currentScan.nom) { showToast('Donne un nom au produit', 'error'); return; }

  const btn = document.getElementById('btn-upload');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Envoi…';

  try {
    // Sauvegarde le nom si nouveau
    if (!produitsDict[currentScan.code]) {
      produitsDict[currentScan.code] = currentScan.nom;
      await saveProduitsJson();
    }

    // Charge les entrées du jour et ajoute
    const entries = await loadDayEntries(currentScan.date);
    entries.push({ heure: currentScan.heure, code: currentScan.code, nom: currentScan.nom });
    await uploadDayJson(currentScan.date, entries);

    showToast('Enregistré ✓', 'success');
    document.getElementById('result-card').className = 'result-card';
    currentScan = null;
  } catch (e) {
    showToast('Erreur d\'upload', 'error');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.textContent = '✓ Enregistrer sur Drive';
  }
}

async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Chargement…</div>';

  if (!accessToken) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">Connecte-toi pour voir l\'historique</div></div>';
    return;
  }

  const folders = await listDayFolders();
  if (folders.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Aucun scan enregistré</div></div>';
    return;
  }

  // Charge toutes les entrées pour la recherche
  allEntries = [];
  const counts = {};
  for (const f of folders) {
    const entries = await loadDayEntries(f.name);
    counts[f.name] = entries.length;
    entries.forEach(e => allEntries.push({ ...e, date: f.name }));
  }

  renderDaysList(folders, counts);
}

function renderDaysList(folders, counts) {
  currentView = 'days';
  const el = document.getElementById('history-content');
  if (folders.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">Aucun scan</div></div>';
    return;
  }
  el.innerHTML = `<div class="days-list">${folders.map(f => `
    <div class="day-card" onclick="showDay('${f.name}')">
      <span class="day-date">${formatDate(f.name)}</span>
      <span class="day-count">${counts[f.name] || 0} produit${(counts[f.name] || 0) > 1 ? 's' : ''}</span>
    </div>`).join('')}</div>`;
}

async function showDay(dateStr) {
  currentView = 'day';
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Chargement…</div>';

  const entries = await loadDayEntries(dateStr);
  el.innerHTML = `
    <button class="back-btn" onclick="loadHistory()">← Retour</button>
    <div class="day-title">${formatDate(dateStr)}</div>
    <div class="entries-list">
      ${entries.length === 0
        ? '<div class="empty-state"><div class="empty-text">Aucune entrée</div></div>'

      }

}

function renderEntry(e) {
  return `<div class="entry-card">
    <div class="entry-top">
      <div class="entry-name">${e.nom}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="entry-time">${e.heure}</div>
        <button class="btn-edit" onclick="renameProduct('${e.code}', '${(e.nom||'').replace(/'/g,"\'")}')">✏️</button>
      </div>
    </div>
    <div class="entry-code">${e.code}</div>
  </div>`;
}

function handleSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const el = document.getElementById('history-content');

  if (!q) { loadHistory(); return; }

  const results = allEntries.filter(e => e.nom && e.nom.toLowerCase().includes(q));

  if (results.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">Aucun résultat</div></div>';
    return;
  }

  // Groupe par nom
  const grouped = {};
  results.forEach(e => {
    if (!grouped[e.nom]) grouped[e.nom] = [];
    grouped[e.nom].push(e);
  });

  el.innerHTML = `
    <div class="search-results-title">${results.length} résultat${results.length > 1 ? 's' : ''}</div>
    <div class="entries-list">
      ${Object.entries(grouped).map(([nom, items]) => `
        <div class="entry-card">
          <div class="entry-name">${nom}</div>
          <div class="entry-code">${items[0].code}</div>
          <div style="margin-top:8px;display:flex;flex-direction:column;gap:4px;">
            ${items.map(i => `<div style="font-size:12px;color:var(--text-dim);">${formatDate(i.date)} à ${i.heure}</div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`;
}

function generateCode(nom) {
  // Code unique basé sur timestamp + nom hashé
  const ts = Date.now().toString(36).toUpperCase();
  const hash = nom.split('').reduce((a, c) => (a * 31 + c.charCodeAt(0)) & 0xFFFF, 0).toString(16).toUpperCase().padStart(4, '0');
  return `BA${hash}${ts}`;
}

function createLabel() {
  const input = document.getElementById('label-name-input');
  const nom = input.value.trim();
  if (!nom) { showToast('Entre un nom de produit', 'error'); return; }

  const code = generateCode(nom);
  showBarcode(code, nom);
  input.value = '';
}

function showBarcode(code, nom) {
  const preview = document.getElementById('barcode-preview');
  document.getElementById('barcode-nom').textContent = nom;
  document.getElementById('barcode-code-display').textContent = code;
  preview.className = 'barcode-preview visible';

  JsBarcode('#barcode-svg', code, {
    format: 'CODE128',
    width: 2,
    height: 60,
    displayValue: false,
    margin: 8
  });

  // Sauvegarde dans produits.json si connecté
  if (accessToken && !produitsDict[code]) {
    produitsDict[code] = nom;
    saveProduitsJson().then(() => showToast('Étiquette sauvegardée ✓', 'success'));
  } else if (!accessToken) {
    showToast('Connecte-toi pour sauvegarder', 'error');
  }
}

  updateSelectBar();

function clearLabelSelection() {

  } else {
    const form = new FormData();
    form.append('metadata', new Blob([JSON.stringify({ name: 'congelateur.json', parents: [driveFolderId] })], { type: 'application/json' }));
    form.append('file', blob);
    await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}` },
      body: form
    });
  }
}

async function loadFreezer() {
  const el = document.getElementById('freezer-content');
  if (!accessToken) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔒</div><div class="empty-text">Connecte-toi pour voir le congélateur</div></div>';
    return;
  }
  el.innerHTML = '<div class="loading"><span class="spinner"></span>Chargement…</div>';
  freezerItems = await loadFreezerJson();
  renderFreezer();
}

function renderFreezer() {
  const el = document.getElementById('freezer-content');
  if (freezerItems.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🧊</div><div class="empty-text">Congélateur vide</div></div>';
    return;
  }
  el.innerHTML = `
    <div class="freezer-header">
      <div class="freezer-count">${freezerItems.length} produit${freezerItems.length > 1 ? 's' : ''}</div>
    </div>
    <div class="freezer-list">
      ${freezerItems.map((item, i) => `
        <div class="freezer-card">
          <div style="font-size:24px;">🧊</div>
          <div class="freezer-card-info">
            <div class="freezer-card-name">${item.nom}</div>
            <div class="freezer-card-date">Entré le ${formatDate(item.date)}</div>
            <div class="freezer-card-age">${daysAgo(item.date)}</div>
          </div>
          <button class="btn-remove" onclick="removeFreezerItem(${i})">🗑️</button>
        </div>`).join('')}
    </div>`;
}

function daysAgo(dateStr) {
  const diff = Math.floor((Date.now() - new Date(dateStr + 'T00:00:00')) / 86400000);
  if (diff === 0) return "Entré aujourd'hui";
  if (diff === 1) return 'Il y a 1 jour';
  return `Il y a ${diff} jours`;
}

async function addFreezerItem(nom, code) {
  if (!accessToken) { showToast("Connecte-toi d'abord", 'error'); return; }
  if (!nom) { showToast('Nom manquant', 'error'); return; }
  const date = new Date().toISOString().slice(0, 10);
  freezerItems.unshift({ nom, code: code || '', date });
  await saveFreezerJson();
  renderFreezer();
  showToast(`${nom} ajouté ✓`, 'success');
}

async function removeFreezerItem(index) {
  const item = freezerItems[index];
  if (!confirm(`Retirer "${item.nom}" du congélateur ?`)) return;
  freezerItems.splice(index, 1);
  await saveFreezerJson();
  renderFreezer();
  showToast('Retiré ✓', 'success');
}

async function addFreezerManual() {
  const input = document.getElementById('freezer-manual-input');
  const nom = input.value.trim();
  if (!nom) return;
  await addFreezerItem(nom, '');
  input.value = '';
}

async function startFreezerScan() {
  if (freezerScanActive) { stopFreezerScan(); return; }
  try {
    freezerScanActive = true;
    document.getElementById('btn-freezer-scan').textContent = '⏹ Arrêter';
    freezerCodeReader = new Html5Qrcode('freezer-reader');
    await freezerCodeReader.start(
      { facingMode: 'environment' },
      { fps: 15, qrbox: { width: 280, height: 140 }, aspectRatio: 1.5 },
      async (code) => {
        if (!freezerScanActive) return;
        stopFreezerScan();
        const nom = produitsDict[code] || null;
        if (nom) {
          await addFreezerItem(nom, code);
        } else {
          // Demande le nom
          const input = document.getElementById('freezer-manual-input');
          input.value = '';
          input.placeholder = `Nom pour ${code}…`;
          input.focus();
          // Stocke le code en attente
          input.dataset.pendingCode = code;
          showToast('Produit inconnu — entre le nom', 'error');
        }
      },
      () => {}
    );
  } catch(e) {
    freezerScanActive = false;
    document.getElementById('btn-freezer-scan').textContent = '📷 Scanner';
    showToast('Caméra inaccessible', 'error');
  }
}

function stopFreezerScan() {
  freezerScanActive = false;
  if (freezerCodeReader) {
    try { freezerCodeReader.stop(); } catch(e) {}
    freezerCodeReader = null;
  }
  document.getElementById('btn-freezer-scan').textContent = '📷 Scanner';
}

// Override addFreezerManual pour gérer le code en attente
const _origAddFreezerManual = addFreezerManual;
async function addFreezerManual() {
  const input = document.getElementById('freezer-manual-input');
  const nom = input.value.trim();
  if (!nom) return;
  const pendingCode = input.dataset.pendingCode || '';
  if (pendingCode && !produitsDict[pendingCode]) {
    produitsDict[pendingCode] = nom;
    await saveProduitsJson();
  }
  await addFreezerItem(nom, pendingCode);
  input.value = '';
  input.placeholder = 'Nom du produit…';
  delete input.dataset.pendingCode;
}

// ═══════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active',
      (tab === 'scan' && i === 0) ||
      (tab === 'history' && i === 1) ||
      (tab === 'labels' && i === 2) ||
      (tab === 'freezer' && i === 3)
    );
  });
  document.getElementById('page-scan').classList.toggle('active', tab === 'scan');
  document.getElementById('page-history').classList.toggle('active', tab === 'history');
  document.getElementById('page-labels').classList.toggle('active', tab === 'labels');
  document.getElementById('page-freezer').classList.toggle('active', tab === 'freezer');
  if (tab === 'history') loadHistory();
  if (tab === 'labels') loadLabels();
  if (tab === 'freezer') loadFreezer();
  if (tab === 'scan') { stopScan(); stopFreezerScan(); }
  if (tab !== 'freezer') stopFreezerScan();
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = 'toast'; }, 2500);
}

// Init
window.addEventListener('load', () => {
  // Tente de restaurer le token depuis localStorage
  const savedToken = localStorage.getItem('ga_token');
  const savedExpiry = localStorage.getItem('ga_expiry');
  if (savedToken && savedExpiry && Date.now() < parseInt(savedExpiry)) {
    accessToken = savedToken;
    setConnectedUI();
    // Charge la lib puis initDrive sans redemander l'auth
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = () => { initGoogleAuth(); initDrive(); };
    document.head.appendChild(s);
  } else {
    localStorage.removeItem('ga_token');
    localStorage.removeItem('ga_expiry');
    const s = document.createElement('script');
    s.src = 'https://accounts.google.com/gsi/client';
    s.onload = initGoogleAuth;
    document.head.appendChild(s);
  }
  cleanOldFolders();
});
</script>
